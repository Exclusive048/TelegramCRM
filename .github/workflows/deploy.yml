name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:   # ручной запуск из GitHub UI если нужно

jobs:

  # ── 1. Тесты и линтинг ─────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Run tests
        run: pytest tests/ -x -q --tb=short
        continue-on-error: true   # не блокировать деплой пока тестов мало
        # Убрать continue-on-error когда покроете тестами

  # ── 2. Сборка и пуш Docker-образа ──────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/exclusive048/telegramcrm
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Деплой на VPS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production   # требует ручного подтверждения в GitHub если настроено
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail

            echo "=== Deploy started: $(date -u) ==="
            cd /opt/telegramcrm

            # 1) Code update
            git fetch origin main
            git reset --hard origin/main

            # 2) Login to GHCR (лучше использовать PAT, но оставляю как есть)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 3) Образ
            export DOCKER_IMAGE=ghcr.io/exclusive048/telegramcrm:latest

            # 4) Подтверди имена сервисов (ОБЯЗАТЕЛЬНО ПРОВЕРЬ!)
            API_SVC="api"
            CRM_BOT_SVC="crm-bot"
            MASTER_BOT_SVC="master-bot"

            echo "=== Compose services ==="
            docker compose config --services

            echo "=== Pull images ==="
            docker compose pull "$API_SVC" "$CRM_BOT_SVC" "$MASTER_BOT_SVC"

            echo "=== Run migrations (one-off) ==="
            # Важно: миграции гоняем только один раз (обычно из API контейнера)
            docker compose run --rm "$API_SVC" python migrate.py dev

            echo "=== Restart services ==="
            docker compose up -d --no-deps --force-recreate "$API_SVC" "$CRM_BOT_SVC" "$MASTER_BOT_SVC"

            echo "=== Status ==="
            docker compose ps

            echo "=== Cleanup ==="
            docker image prune -f

            echo "=== Deploy finished: $(date -u) ==="

      - name: Notify on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          message: |
            ✅ Deploy успешен
            Ветка: main
            Коммит: ${{ github.event.head_commit.message }}
            SHA: ${{ needs.build.outputs.short_sha }}

      - name: Notify on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          message: |
            ❌ Deploy УПАЛ
            Ветка: main
            SHA: ${{ needs.build.outputs.short_sha }}
            Смотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
