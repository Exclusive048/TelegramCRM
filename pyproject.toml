[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
  ".venv",
  "venv",
  "__pycache__",
  ".mypy_cache",
  ".ruff_cache",
  ".git",
]

[tool.ruff.lint]
select = ["E9", "F", "B"]
ignore = [
  # FastAPI uses Depends()/Query() in defaults by design; B008 is noisy here.
  "B008",
]

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["F401"]

[tool.mypy]
python_version = "3.10"
files = ["app", "main.py"]
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = true
show_error_codes = true
pretty = true
ignore_errors = true

[[tool.mypy.overrides]]
module = [
  "app.api.schemas.*",
  "app.api.deps",
  "app.api.routes.leads",
]
ignore_errors = false
