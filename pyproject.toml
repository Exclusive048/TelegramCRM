[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
  ".venv",
  "venv",
  "__pycache__",
  ".mypy_cache",
  ".ruff_cache",
  ".git",
]

[tool.ruff.lint]
select = ["F"]
ignore = ["F401"]

[tool.mypy]
python_version = "3.10"
files = ["app", "main.py"]
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = true
show_error_codes = true
pretty = true
ignore_errors = true
