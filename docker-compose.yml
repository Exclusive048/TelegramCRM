version: "3.9"

services:

  # ── Приложение (оба бота + FastAPI) ────────────────────────────────────────
  app:
    image: ${DOCKER_IMAGE:-telegramcrm:latest}
    build: .
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      USE_REDIS: ${USE_REDIS}
      BOT_TOKEN: ${BOT_TOKEN}
      MASTER_BOT_TOKEN: ${MASTER_BOT_TOKEN}
      CRM_BOT_USERNAME: ${CRM_BOT_USERNAME}
      MASTER_ADMIN_TG_ID: ${MASTER_ADMIN_TG_ID}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      SUBSCRIPTION_PRICE: ${SUBSCRIPTION_PRICE}
      SUBSCRIPTION_DAYS: ${SUBSCRIPTION_DAYS}
      TRIAL_DAYS: ${TRIAL_DAYS}
      REFERRAL_BONUS_DAYS: ${REFERRAL_BONUS_DAYS}
      SUPPORT_USERNAME: ${SUPPORT_USERNAME}
      SLA_NEW_HOURS: ${SLA_NEW_HOURS}
      SLA_IN_PROGRESS_DAYS: ${SLA_IN_PROGRESS_DAYS}
      YUKASSA_SHOP_ID: ${YUKASSA_SHOP_ID}
      YUKASSA_SECRET_KEY: ${YUKASSA_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.crm.entrypoints=websecure"
      - "traefik.http.routers.crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm.loadbalancer.server.port=8000"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.crm-http.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.crm-http.entrypoints=web"
      - "traefik.http.routers.crm-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    # Порт НЕ проброшен наружу — только внутренняя сеть

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Порт НЕ проброшен наружу

  # ── Traefik (reverse proxy + SSL) ──────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    restart: always
    command:
      - "--api.dashboard=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=WARN"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/telegramcrm/traefik:/etc/traefik:ro
      - letsencrypt:/letsencrypt
    networks:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backup PostgreSQL (раз в сутки) ─────────────────────────────────────────
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: always
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
    volumes:
      - ./backups:/backups
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

networks:
  internal:
    driver: bridge
    internal: true   # нет доступа в интернет — только между контейнерами
  web:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  letsencrypt: